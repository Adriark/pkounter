name: Update MunchStats data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  update-munchstats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync MunchStats data
        run: npm run sync:munchstats

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add munchstats-data.js champions-data.js champions-items.js champions-moves.js locales-data.js

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update MunchStats data"
            git push
          fi